<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="favicon.ico?v=3" />
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=3" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png?v=3" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карта участков — Земельные решения | Земля МО</title>
  <meta name="description" content="Интерактивная карта земельных участков Московской области. Промышленные, коммерческие участки и производственные базы с фильтрами по площади, цене и направлению." />
  <meta name="keywords" content="карта земельных участков московская область, промышленная земля на карте МО" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://adzemlia.ru/catalog.html" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://adzemlia.ru/catalog.html" />
  <meta property="og:title" content="Карта участков МО | Земельные решения" />
  <meta property="og:description" content="Интерактивная карта промышленных и коммерческих участков Московской области." />
  <meta property="og:image" content="https://adzemlia.ru/og-image.jpg" />
  <meta property="og:locale" content="ru_RU" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <!-- Yandex.Metrika — замените XXXXXXXX на ваш номер счётчика -->
  <script type="text/javascript">
    (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
    m[i].l=1*new Date();
    for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}
    k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
    (window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");
    ym(XXXXXXXX,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true});
  </script>
  <noscript><div><img src="https://mc.yandex.ru/watch/XXXXXXXX" style="position:absolute;left:-9999px;" alt=""></div></noscript>
  <!-- /Yandex.Metrika -->
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__back">← На сайт</a>
      <div class="header__logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>
        <span>Земельные участки</span>
      </div>
      <div class="header__stats" id="stats">Загрузка...</div>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <button class="filters__toggle" id="filters-toggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Фильтры
        <span class="filters__toggle-arrow">▼</span>
      </button>
      <div class="filters" id="filters-panel">
        <div class="filters__title">Фильтры</div>

        <div class="filter-group">
          <label>Статус</label>
          <div class="checkbox-group" id="filter-status">
            <label><input type="checkbox" value="available" checked> Продаётся</label>
            <label><input type="checkbox" value="reserved" checked> Зарезервирован</label>
            <label><input type="checkbox" value="sold" checked> Продан</label>
          </div>
        </div>

        <div class="filter-group">
          <label>Категория земель</label>
          <select id="filter-category">
            <option value="">Все категории</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Площадь, га</label>
          <div class="range-inputs">
            <input type="number" id="filter-area-min" placeholder="от" min="0" step="0.1">
            <span>—</span>
            <input type="number" id="filter-area-max" placeholder="до" min="0" step="0.1">
          </div>
        </div>

        <div class="filter-group">
          <label>Цена, ₽</label>
          <div class="range-inputs">
            <input type="number" id="filter-price-min" placeholder="от" min="0" step="100000">
            <span>—</span>
            <input type="number" id="filter-price-max" placeholder="до" min="0" step="100000">
          </div>
        </div>

        <button class="btn-reset" id="btn-reset">Сбросить фильтры</button>
      </div>

      <div class="list-section">
        <div class="list-header">
          <span id="list-count">0 объектов</span>
          <select id="list-sort">
            <option value="price-asc">Цена ↑</option>
            <option value="price-desc">Цена ↓</option>
            <option value="area-asc">Площадь ↑</option>
            <option value="area-desc">Площадь ↓</option>
          </select>
        </div>
        <div class="object-list" id="object-list"></div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
    </main>

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal__close" id="modal-close">&times;</button>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
  <script>
    const toggleBtn = document.getElementById('filters-toggle');
    const filtersPanel = document.getElementById('filters-panel');
    toggleBtn?.addEventListener('click', () => {
      const open = filtersPanel.classList.toggle('open');
      toggleBtn.classList.toggle('open', open);
    });
  </script>
</body>
</html>
