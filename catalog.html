<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог земельных участков</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <div class="header__logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>
        <span>Земельные участки</span>
      </div>
      <div class="header__stats" id="stats">Загрузка...</div>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <div class="filters">
        <div class="filters__title">Фильтры</div>

        <div class="filter-group">
          <label>Статус</label>
          <div class="checkbox-group" id="filter-status">
            <label><input type="checkbox" value="available" checked> Продаётся</label>
            <label><input type="checkbox" value="reserved" checked> Зарезервирован</label>
            <label><input type="checkbox" value="sold" checked> Продан</label>
          </div>
        </div>

        <div class="filter-group">
          <label>Категория земель</label>
          <select id="filter-category">
            <option value="">Все категории</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Площадь, га</label>
          <div class="range-inputs">
            <input type="number" id="filter-area-min" placeholder="от" min="0" step="0.1">
            <span>—</span>
            <input type="number" id="filter-area-max" placeholder="до" min="0" step="0.1">
          </div>
        </div>

        <div class="filter-group">
          <label>Цена, ₽</label>
          <div class="range-inputs">
            <input type="number" id="filter-price-min" placeholder="от" min="0" step="100000">
            <span>—</span>
            <input type="number" id="filter-price-max" placeholder="до" min="0" step="100000">
          </div>
        </div>

        <button class="btn-reset" id="btn-reset">Сбросить фильтры</button>
      </div>

      <div class="list-section">
        <div class="list-header">
          <span id="list-count">0 объектов</span>
          <select id="list-sort">
            <option value="price-asc">Цена ↑</option>
            <option value="price-desc">Цена ↓</option>
            <option value="area-asc">Площадь ↑</option>
            <option value="area-desc">Площадь ↓</option>
          </select>
        </div>
        <div class="object-list" id="object-list"></div>
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
    </main>

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal__close" id="modal-close">&times;</button>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
