<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="favicon.ico?v=3" />
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=3" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png?v=3" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Земельные решения</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css" />
  <style>
    .page404 {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 60px 20px;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .page404__inner {
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* 404 с глитч-эффектом */
    .page404__num {
      font-family: var(--font-serif);
      font-size: clamp(96px, 18vw, 160px);
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      opacity: 0.12;
      margin-bottom: -20px;
      user-select: none;
      position: relative;
      animation: glitch 3s infinite;
    }
    .page404__num::before,
    .page404__num::after {
      content: '404';
      position: absolute;
      left: 0; right: 0;
      opacity: 0.6;
    }
    .page404__num::before {
      color: #c9a84c;
      animation: glitch-top 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }
    .page404__num::after {
      color: #2d5a2d;
      animation: glitch-bot 3s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: none; }
      92% { transform: skewX(-2deg); }
      94% { transform: skewX(2deg); }
      96% { transform: skewX(-1deg); }
    }
    @keyframes glitch-top {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92% { transform: translate(-4px, -2px); opacity: 0.7; }
      94% { transform: translate(4px, 0); opacity: 0.5; }
      96% { transform: translate(-2px, 1px); opacity: 0; }
    }
    @keyframes glitch-bot {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92% { transform: translate(4px, 2px); opacity: 0.7; }
      94% { transform: translate(-4px, 0); opacity: 0.5; }
      96% { transform: translate(2px, -1px); opacity: 0; }
    }

    /* Прыгающий эмодзи */
    .page404__emoji {
      font-size: 56px;
      display: block;
      margin-bottom: 20px;
      animation: bounce 1.4s ease infinite;
      transform-origin: center bottom;
      cursor: default;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); animation-timing-function: cubic-bezier(0.33,0,0.66,0); }
      45%       { transform: translateY(-28px) rotate(5deg); animation-timing-function: cubic-bezier(0.33,1,0.66,1); }
      70%       { transform: translateY(-10px) rotate(-3deg); }
    }

    /* Контент появляется снизу */
    .page404__title {
      font-family: var(--font-serif);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      animation: fadeUp 0.7s ease both 0.1s;
    }
    .page404__sub {
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 36px;
      animation: fadeUp 0.7s ease both 0.2s;
    }
    .page404__actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.7s ease both 0.35s;
    }
    .btn--outline-dark {
      background: transparent;
      color: var(--green);
      border: 2px solid var(--green);
    }
    .btn--outline-dark:hover {
      background: var(--green);
      color: var(--white);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Падающие шоколадки */
    .choco {
      position: fixed;
      top: -60px;
      font-size: 28px;
      user-select: none;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .page404__num, .page404__num::before, .page404__num::after { animation: none; }
      .page404__emoji { animation: none; }
      .page404__title, .page404__sub, .page404__actions { animation: none; }
      .choco { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav nav--static" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">Земельные<span> решения</span></a>
      <div class="nav__links">
        <a href="/#about">Обо мне</a>
        <a href="services.html">Услуги</a>
        <a href="objects.html">Объекты</a>
        <a href="partnership.html">Партнёрство</a>
        <a href="/#contact">Контакт</a>
        <a href="catalog.html" class="nav__cta">Карта →</a>
      </div>
      <button class="nav__burger" id="burger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="page404">
    <div class="page404__inner">
      <div class="page404__num">404</div>
      <span class="page404__emoji">🍫</span>
      <h1 class="page404__title">Технические шоколадки</h1>
      <p class="page404__sub">
        Страница куда-то делась — возможно, её снесли под застройку.<br>
        Пока ищем виновных, угощайтесь шоколадкой и возвращайтесь на главную.
      </p>
      <div class="page404__actions">
        <a href="/" class="btn btn--primary">На главную</a>
        <a href="objects.html" class="btn btn--outline-dark">Смотреть объекты</a>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
  <script>
    const emojis = ['🍫', '🍬', '🍭', '🍩'];
    function spawnChoco() {
      const el = document.createElement('span');
      el.className = 'choco';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (20 + Math.random() * 24) + 'px';
      const dur = 2.5 + Math.random() * 3;
      el.style.animationDuration = dur + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000);
    }
    // Запустить несколько сразу, потом по одной каждые 400ms
    for (let i = 0; i < 6; i++) setTimeout(spawnChoco, i * 200);
    setInterval(spawnChoco, 400);

    // Клик по эмодзи — выстрел шоколадок
    document.querySelector('.page404__emoji').addEventListener('click', () => {
      for (let i = 0; i < 8; i++) setTimeout(spawnChoco, i * 60);
    });
  </script>
</body>
</html>
